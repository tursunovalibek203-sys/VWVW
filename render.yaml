services:
  - type: web
    name: luxpetplast-api
    env: node
    plan: free
    region: oregon
    buildCommand: npm ci && npx prisma generate && npx prisma db push --skip-generate
    startCommand: npx tsx server/index.ts
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://luxpetplast-alpha.vercel.app,https://luxpetplast.vercel.app
      - key: USD_TO_UZS_RATE
        value: "12500"
