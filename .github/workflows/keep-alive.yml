name: Render Keep-Alive Ping

on:
  schedule:
    # Har 14 daqiqada ping (Render free tier 15 daqiqada uxlaydi)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Qo'lda ham ishga tushirish uchun

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://luxpetplast-api.onrender.com/api/health)
          echo "Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Server alive"
          else
            echo "Server waking up (status $STATUS)"
          fi
