[build]
  # --include=dev majburiy: NODE_ENV=production bo'lsa npm ci devDeps (vite,
  # terser, typescript...) ni o'tkazib yuboradi -> "vite: command not found"
  command = "npm ci --include=dev && npm run build:client"
  publish = "dist"

[build.environment]
  NODE_ENV = "production"
  VITE_API_URL = "https://luxpetplast.onrender.com"

[[redirects]]
  from = "/api/*"
  to = "https://luxpetplast.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Content-Type = "image/svg+xml"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
